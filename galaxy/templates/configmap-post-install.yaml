{{- if .Values.postInstallJob.galaxyUser -}}
{{- $galaxyUrl := printf "http://%s-nginx.%s.svc.cluster.local:%d" (include "galaxy.fullname" .) .Release.Namespace (int .Values.service.port) -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "galaxy.fullname" . }}-post-install
  labels:
    {{- include "galaxy.labels" . | nindent 4 }}
data:
  run_imports.sh: |
    #!/bin/sh
    set -e

    mkdir -p ~/.abm

    cat > ~/.abm/profile.yml <<PROFILE
    main:
      url: "${GALAXY_URL}"
      key: ""
      master: "${GALAXY_MASTER_KEY}"
    PROFILE

    echo "Ensuring user ${GALAXY_USER} exists and has an API key..."
    USER_KEY=$(python3 -c "import secrets, string; from bioblend.galaxy import GalaxyInstance; gi = GalaxyInstance('${GALAXY_URL}', '${GALAXY_MASTER_KEY}'); users = gi.users.get_users(f_email='${GALAXY_USER}'); user = users[0] if users else gi.users.create_local_user('${GALAXY_USER}', '${GALAXY_USER}', ''.join(secrets.choice(string.ascii_letters + string.digits) for _ in range(20))); key = gi.users.get_user_apikey(user['id']); print(key if key != 'Not available.' else gi.users.create_user_apikey(user['id']))" 2>/dev/null)

    if [ -z "${USER_KEY}" ] || [ "${USER_KEY}" = "Not available." ]; then
      echo "ERROR: failed to obtain or create API key for ${GALAXY_USER}" >&2
      exit 1
    fi

    cat > ~/.abm/profile.yml <<PROFILE
    main:
      url: "${GALAXY_URL}"
      key: "${USER_KEY}"
    PROFILE

    echo "Importing workflows..."
    while IFS= read -r url; do
      [ -z "${url}" ] && continue
      echo "  Uploading workflow: ${url}"
      abm main workflow upload "${url}" --no-tools
    done < /imports/workflows.txt

    echo "Importing datasets..."
    TAB=$(printf '\t')
    CREATED_HISTORIES=""
    while IFS="$TAB" read -r url file_type history; do
      [ -z "${url}" ] && continue
      hist_name="${history:-Imported Datasets}"
      echo "  Uploading dataset: ${url}"
      case "${CREATED_HISTORIES}" in
        *"|${hist_name}|"*)
          abm main dataset upload "${url}" --history "${hist_name}"
          ;;
        *)
          abm main dataset upload "${url}" --create "${hist_name}"
          CREATED_HISTORIES="${CREATED_HISTORIES}|${hist_name}|"
          ;;
      esac
    done < /imports/datasets.tsv

    echo "Importing histories..."
    while IFS= read -r url; do
      [ -z "${url}" ] && continue
      echo "  Importing history: ${url}"
      abm main history import "${url}"
    done < /imports/histories.txt

    echo "Post-install imports complete."

  workflows.txt: |
    {{- range .Values.postInstallJob.imports.workflows }}
    {{ . }}
    {{- end }}

  datasets.tsv: |
    {{- range .Values.postInstallJob.imports.datasets }}
    {{ .url }}	{{ .fileType | default "auto" }}	{{ .history | default "Imported Datasets" }}
    {{- end }}

  histories.txt: |
    {{- range .Values.postInstallJob.imports.histories }}
    {{ . }}
    {{- end }}
{{- end }}
